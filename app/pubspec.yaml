name: icelegends_app
description: IceLegends SMP — Mobile Panel
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Auth & Storage
  flutter_secure_storage: ^9.0.0

  # State
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.67.0

  # WebSocket
  web_socket_channel: ^2.4.0

  # UI helpers
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  timeago: ^3.6.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
