<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profil — IceLegends SMP</title>
  <link rel="stylesheet" href="/player/ice.css">
  <style>
    /* ── Player header ── */
    .profile-header {
      display:flex; align-items:center; gap:24px; flex-wrap:wrap;
      background:linear-gradient(135deg,rgba(4,15,38,.92),rgba(8,26,54,.85));
      border:1px solid var(--border); border-radius:var(--r-lg);
      padding:28px 32px; margin-bottom:28px; position:relative; overflow:hidden;
    }
    .profile-header::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(100,223,223,.4),transparent);
    }
    .player-avatar {
      width:72px; height:72px; border-radius:12px;
      border:2px solid rgba(100,223,223,.25);
      box-shadow:0 0 20px rgba(100,223,223,.15);
      background:rgba(100,223,223,.05);
    }
    .player-info { flex:1; }
    .player-name {
      font-family:'Exo 2',sans-serif; font-size:1.9rem; font-weight:900; color:#fff;
      margin-bottom:6px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    }
    .clan-badge {
      display:inline-block; padding:2px 10px; border-radius:6px;
      background:rgba(100,223,223,.1); border:1px solid rgba(100,223,223,.25);
      color:var(--ice); font-size:.75rem; font-weight:700; letter-spacing:1px;
    }
    .player-balance {
      font-family:'Exo 2',sans-serif; font-size:1rem; color:var(--gold);
      font-weight:700;
    }
    .player-balance span { color:var(--muted); font-weight:400; font-size:.82rem; }

    /* ── Skills ── */
    .skill-row {
      background:var(--glass); border:1px solid var(--border); border-radius:var(--r-md);
      padding:16px 20px; display:flex; align-items:center; gap:16px;
      transition:border-color .25s;
    }
    .skill-row:hover { border-color:rgba(100,223,223,.2); }
    .skill-icon-lg { font-size:1.6rem; width:36px; text-align:center; }
    .skill-text { flex:1; }
    .skill-label { font-family:'Exo 2',sans-serif; font-size:.72rem; font-weight:700;
      letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
    .skill-lv { font-family:'Exo 2',sans-serif; font-size:1.2rem; font-weight:900; color:var(--ice); }
    .skill-lv span { font-size:.7rem; color:var(--muted); font-weight:400; }
    .skill-bar { height:5px; background:rgba(100,223,223,.07); border-radius:3px;
      margin-top:7px; overflow:hidden; }
    .skill-bar-fill { height:100%; border-radius:3px; transition:width 1.1s cubic-bezier(.4,0,.2,1); }

    /* ── Achievements ── */
    .achieve-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px;
    }
    .achieve-card {
      background:var(--glass); border:1px solid var(--border); border-radius:var(--r-md);
      padding:16px 14px; text-align:center; transition:all .25s;
    }
    .achieve-card.unlocked {
      border-color:rgba(255,213,128,.25);
      box-shadow:0 4px 20px rgba(255,213,128,.08);
    }
    .achieve-card.unlocked:hover {
      border-color:rgba(255,213,128,.45);
      transform:translateY(-2px);
    }
    .achieve-card.locked { opacity:.38; filter:grayscale(.7); }
    .achieve-icon { font-size:2rem; margin-bottom:8px; line-height:1; }
    .achieve-name { font-family:'Exo 2',sans-serif; font-size:.78rem; font-weight:700;
      color:#fff; margin-bottom:3px; }
    .achieve-desc { font-size:.72rem; color:var(--muted); line-height:1.4; }

    /* ── Not found ── */
    .not-found { text-align:center; padding:80px 20px; }
    .not-found .nf-icon { font-size:3rem; margin-bottom:16px; opacity:.35; }
  </style>
</head>
<body>
<div class="aurora"><div class="a1"></div><div class="a2"></div><div class="a3"></div><div class="a4"></div></div>
<div id="snow"></div>

<nav class="ice-nav">
  <a class="nav-brand" href="/player/dashboard">❄ ICELEGENDS</a>
    <div class="nav-links">
    <a class="nav-link" href="/player/dashboard">Dashboard</a>
    <a class="nav-link" href="/player/bounties">Bounties</a>
    <a class="nav-link" href="/player/stocks">Stocks</a>
    <a class="nav-link" href="/player/capsule">Capsule</a>
    <a class="nav-link" href="/player/wars">Wars</a>
    <a class="nav-link" href="/player/missions">Misiuni</a>
    <a class="nav-link" href="/player/shop">Shop</a>
    <a class="nav-link" href="/player/clans">Clanuri</a>
    <a class="nav-link" href="/player/vote">Vot</a>
    <a class="nav-link" href="/player/appeal">Contestație</a>
  </div>
    <div class="nav-right">
    <img class="nav-mc-head" src="" alt="" style="width:28px;height:28px;border-radius:4px;display:none;image-rendering:pixelated">
    <span class="nav-user-name">Bun venit, <strong id="navName">...</strong></span>
    <button class="btn-logout" onclick="logout()">Delogare</button>
  </div>
</nav>

<div class="page"><div class="container">

  <div id="loadingState" class="loading-wrap"><div class="spinner"></div></div>
  <div id="notFound" class="not-found" style="display:none">
    <div class="nf-icon">❄</div>
    <p style="color:var(--muted);margin-bottom:20px">Jucătorul nu a fost găsit.</p>
    <a class="btn btn-ice" href="/player/dashboard">← Dashboard</a>
  </div>

  <div id="profileContent" style="display:none">
    <!-- Player header injected here -->
    <div id="profileHeader"></div>

    <!-- Skills -->
    <div class="sec-label">Abilități</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px" id="skillsList"></div>

    <!-- Achievements -->
    <div class="sec-label">Realizări</div>
    <div class="achieve-grid" id="achieveGrid" style="margin-bottom:28px"></div>

    <!-- Recent Wars -->
    <div class="sec-label">Războaie Recente</div>
    <div class="card" id="recentWarsWrap"></div>
  </div>

</div></div>

<script src="/player/ice.js"></script>
<script>
const SKILL_META = {
  Pamant: { icon:'⛏', label:'Pământ', color:'#8d6e63' },
  Foc:    { icon:'🔥', label:'Foc',    color:'#ef5350' },
  Viata:  { icon:'🌱', label:'Viață',  color:'#66bb6a' },
  Apa:    { icon:'💧', label:'Apă',    color:'#29b6f6' },
  Vant:   { icon:'🌬', label:'Vânt',   color:'#90caf9' },
};

async function logout() {
  await fetch('/api/player/logout', { method:'POST', credentials:'include' });
  location.href = '/player/login';
}

function skillLevel(xp) {
  const lv = Math.floor((-90 + Math.sqrt(8100 + 40 * xp)) / 20);
  return Math.min(100, Math.max(0, lv || 0));
}

async function init() {
  /* Resolve username */
  const params = new URLSearchParams(location.search);
  let username = params.get('u');

  try {
    const meR = await fetch('/api/player/me', { credentials:'include' });
    if (meR.ok) {
      const me = await meR.json();
      document.getElementById('navName').textContent = me.username;
      if (!username) username = me.username;
    } else {
      document.getElementById('navName').textContent = 'Neautentificat';
      if (!username) { showNotFound(); return; }
    }
  } catch {
    document.getElementById('navName').textContent = 'Neautentificat';
    if (!username) { showNotFound(); return; }
  }

  /* Load profile */
  try {
    const r = await fetch(`/api/player/profile/${encodeURIComponent(username)}`);
    if (!r.ok) { showNotFound(); return; }
    const p = await r.json();
    renderProfile(p);
  } catch { showNotFound(); }
}

function showNotFound() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('notFound').style.display = 'block';
}

function renderProfile(p) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('profileContent').style.display = 'block';
  document.title = `${p.name} — IceLegends SMP`;

  /* Header */
  const clanHtml = p.clan
    ? `<span class="clan-badge">${esc(p.clan.tag)}</span>` : '';
  document.getElementById('profileHeader').innerHTML = `
    <div class="profile-header">
      <img class="player-avatar" src="https://mc-heads.net/avatar/${encodeURIComponent(p.name)}/64" alt="${esc(p.name)}">
      <div class="player-info">
        <div class="player-name">${esc(p.name)} ${clanHtml}</div>
        ${p.clan ? `<div style="color:var(--muted);font-size:.82rem;margin-bottom:6px">
          Clan: <strong style="color:#fff">${esc(p.clan.name)}</strong>
          &nbsp;·&nbsp; Rol: ${p.clan.role === 'leader' ? '👑 Lider' : 'Membru'}</div>` : ''}
        <div class="player-balance">
          ${(p.balance || 0).toLocaleString('ro-RO')} <span>coins</span>
        </div>
      </div>
    </div>`;

  /* Skills */
  const skillsEl = document.getElementById('skillsList');
  skillsEl.innerHTML = Object.entries(SKILL_META).map(([key, meta]) => {
    const lv = skillLevel((p.skills || {})[key] || 0);
    return `
      <div class="skill-row">
        <div class="skill-icon-lg">${meta.icon}</div>
        <div class="skill-text">
          <div class="skill-label">${meta.label}</div>
          <div class="skill-lv">${lv} <span>/ 100</span></div>
          <div class="skill-bar">
            <div class="skill-bar-fill"
              style="width:${lv}%;background:linear-gradient(90deg,#1a3a5c,${meta.color})"></div>
          </div>
        </div>
        <div style="font-family:'Exo 2',sans-serif;font-size:.75rem;color:var(--muted);white-space:nowrap">
          ${lv}%
        </div>
      </div>`;
  }).join('');

  /* Achievements */
  const achieveEl = document.getElementById('achieveGrid');
  const achievements = p.achievements || [];
  if (!achievements.length) {
    achieveEl.innerHTML = '<div class="empty" style="grid-column:1/-1">Nicio realizare înregistrată.</div>';
  } else {
    achieveEl.innerHTML = achievements.map(a => `
      <div class="achieve-card ${a.unlocked ? 'unlocked' : 'locked'}">
        <div class="achieve-icon">${esc(a.icon || '🏆')}</div>
        <div class="achieve-name">${esc(a.name)}</div>
        <div class="achieve-desc">${esc(a.desc)}</div>
      </div>`).join('');
  }

  /* Recent Wars */
  const warsEl = document.getElementById('recentWarsWrap');
  const wars = p.recentWars || [];
  if (!wars.length) {
    warsEl.innerHTML = '<div class="empty">Niciun război recent.</div>';
  } else {
    const rows = wars.map(w => {
      const won = w.winner === p.name;
      return `<tr>
        <td>${esc(w.attacker)} <span style="color:var(--muted)">vs</span> ${esc(w.defender)}</td>
        <td>${esc(w.winner || '—')}</td>
        <td style="color:${won ? '#64ffda' : '#ff5252'}">${won ? '✔ Victorie' : '✘ Înfrângere'}</td>
        <td style="color:var(--gold)">${(w.stake || 0).toLocaleString('ro-RO')} coins</td>
        <td style="color:var(--muted);font-size:.8rem">${w.ended_at ? new Date(w.ended_at).toLocaleDateString('ro-RO') : '—'}</td>
      </tr>`;
    }).join('');
    warsEl.innerHTML = `
      <div style="overflow-x:auto">
        <table class="ice-table">
          <thead><tr>
            <th>Participanți</th><th>Câștigător</th><th>Rezultat</th><th>Miză</th><th>Data</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
