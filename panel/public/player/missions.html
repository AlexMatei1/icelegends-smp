<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Misiuni — IceLegends</title>
  <link rel="stylesheet" href="/player/ice.css">
  <style>
    :root { --accent: var(--ice); --surface: var(--glass); }

    /* Mission cards grid */
    .mission-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .mission-grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .mission-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .mission-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mission-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .mission-card:hover {
      border-color: rgba(100,223,223,.22);
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0,0,0,.35), 0 0 20px rgba(100,223,223,.06);
    }
    .mission-card.active-mission {
      border-color: rgba(100,223,223,.45);
      box-shadow: 0 0 0 1px rgba(100,223,223,.18), 0 12px 40px rgba(0,0,0,.4), 0 0 40px rgba(100,223,223,.08);
    }
    .mission-card.active-mission::before {
      background: linear-gradient(90deg, transparent, rgba(100,223,223,.6), transparent);
    }

    .mission-icon { font-size: 2.2rem; line-height: 1; filter: drop-shadow(0 0 8px rgba(100,223,223,.2)); }
    .mission-type {
      font-family: 'Exo 2', sans-serif;
      font-size: .72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted);
    }
    .mission-desc {
      font-size: .88rem;
      color: rgba(232,244,248,.85);
      line-height: 1.45;
      flex: 1;
    }
    .mission-amount {
      font-family: 'Exo 2', sans-serif;
      font-size: .82rem; font-weight: 600;
      color: rgba(232,244,248,.6);
    }
    .mission-reward {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.2rem; font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,213,128,.3);
    }
    .mission-reward span { font-size: .72rem; color: var(--muted); font-weight: 400; margin-left: 4px; }

    .diff-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .68rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      width: fit-content;
    }
    .diff-comun  { background: rgba(255,255,255,.2);  color: rgba(255,255,255,.75); }
    .diff-rar    { background: rgba(100,223,223,.3);  color: #64dfdf; }
    .diff-epic   { background: rgba(200,100,255,.3);  color: #d580ff; }

    .active-badge {
      background: rgba(100,223,223,.12);
      border: 1px solid rgba(100,223,223,.35);
      color: var(--ice);
      border-radius: 4px;
      padding: 2px 9px;
      font-size: .7rem; font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: fit-content;
    }

    /* Active contract section */
    .contract-box {
      background: linear-gradient(135deg, rgba(4,15,38,.92) 0%, rgba(0,30,60,.8) 100%);
      border: 1px solid rgba(100,223,223,.25);
      border-radius: var(--r-lg);
      padding: 28px 30px;
      position: relative;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .contract-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100,223,223,.5), transparent);
    }
    .contract-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .contract-icon { font-size: 2.4rem; filter: drop-shadow(0 0 10px rgba(100,223,223,.3)); }
    .contract-title {
      font-family: 'Exo 2', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      color: var(--ice);
      margin-bottom: 3px;
    }
    .contract-desc { font-size: .88rem; color: rgba(232,244,248,.7); }

    .progress-wrap { margin-bottom: 14px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: .78rem; color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: rgba(100,223,223,.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #1a3a5c, var(--ice));
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    .done-badge {
      background: rgba(100,255,200,.1);
      border: 1px solid rgba(100,255,200,.3);
      color: #64ffda;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: .82rem; font-weight: 700;
      letter-spacing: 1px;
      display: inline-block;
      margin-top: 8px;
    }

    .login-note {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: .88rem;
      background: rgba(100,223,223,.03);
      border: 1px solid rgba(100,223,223,.1);
      border-radius: var(--r-md);
      margin-bottom: 28px;
    }
    .login-note a { color: var(--ice); text-decoration: none; }
    .login-note a:hover { text-decoration: underline; }

    .session-info {
      font-size: .78rem;
      color: var(--muted);
      text-align: right;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div class="aurora"><div class="a1"></div><div class="a2"></div><div class="a3"></div><div class="a4"></div></div>
<div id="snow"></div>

<nav class="ice-nav">
  <a class="nav-brand" href="/player/dashboard">❄ ICELEGENDS</a>
    <div class="nav-links">
    <a class="nav-link" href="/player/dashboard">Dashboard</a>
    <a class="nav-link" href="/player/bounties">Bounties</a>
    <a class="nav-link" href="/player/stocks">Stocks</a>
    <a class="nav-link" href="/player/capsule">Capsule</a>
    <a class="nav-link" href="/player/wars">Wars</a>
    <a class="nav-link active" href="/player/missions">Misiuni</a>
    <a class="nav-link" href="/player/shop">Shop</a>
    <a class="nav-link" href="/player/clans">Clanuri</a>
    <a class="nav-link" href="/player/vote">Vot</a>
    <a class="nav-link" href="/player/appeal">Contestație</a>
  </div>
    <div class="nav-right">
    <img class="nav-mc-head" src="" alt="" style="width:28px;height:28px;border-radius:4px;display:none;image-rendering:pixelated">
    <span class="nav-user-name">Bun venit, <strong id="navName">...</strong></span>
    <button class="btn-logout" onclick="logout()">Delogare</button>
  </div>
</nav>

<div class="page">
  <div class="container">
    <div class="page-hero">
      <div class="page-hero-title">📜 <span class="accent">Misiuni Zilnice</span></div>
      <div class="page-hero-sub">Completează contracte pentru coins</div>
    </div>

    <div id="loadingState" class="loading-wrap"><div class="spinner"></div></div>

    <div id="mainContent" style="display:none">
      <!-- Active contract (logged-in) -->
      <div id="activeSection"></div>

      <!-- Today's missions -->
      <div class="sec-label">Misiunile de Azi</div>
      <div class="session-info" id="sessionInfo"></div>
      <div class="mission-grid" id="missionsGrid"></div>
    </div>
  </div>
</div>

<script src="/player/ice.js"></script>
<script>
const MISSION_META = {
  kill_zombie:   { icon: '🧟', name: 'Ucide Zombi'          },
  kill_skeleton: { icon: '💀', name: 'Ucide Scheleți'       },
  kill_creeper:  { icon: '💚', name: 'Ucide Creeperi'        },
  kill_enderman: { icon: '🟣', name: 'Ucide Endermeni'       },
  kill_spider:   { icon: '🕷', name: 'Ucide Păianjeni'       },
  mine_iron:     { icon: '⚙',  name: 'Minează Fier'          },
  mine_gold:     { icon: '🥇', name: 'Minează Aur'           },
  mine_diamond:  { icon: '💎', name: 'Minează Diamante'      },
  mine_ancient:  { icon: '🔮', name: 'Minează Ancient Debris' },
  harvest_crop:  { icon: '🌾', name: 'Recoltează Culturi'    },
  chop_log:      { icon: '🪵', name: 'Taie Copaci'           },
  travel:        { icon: '🗺', name: 'Călătorește'            },
  kill_wither:   { icon: '💀', name: 'Înfrânge Wither'       },
};

const DIFF_META = {
  Comun: { cls: 'diff-comun', label: 'Comun' },
  Rar:   { cls: 'diff-rar',   label: 'Rar'   },
  Epic:  { cls: 'diff-epic',  label: 'Epic'  },
};

function diffMeta(diff) {
  return DIFF_META[diff] || { cls: 'diff-comun', label: diff || 'Comun' };
}

function missionMeta(type) {
  return MISSION_META[type] || { icon: '📜', name: type };
}

async function init() {
  // Load today's public missions
  let missionsData = null;
  try {
    const r = await fetch('/api/missions', { credentials: 'include' });
    missionsData = await r.json();
  } catch {}

  // Try to load player data (optional — no redirect on failure)
  let playerData = null;
  let playerMission = null;
  try {
    const r = await fetch('/api/player/me', { credentials: 'include' });
    if (r.ok) {
      playerData = await r.json();
      document.getElementById('navName').textContent = playerData.username;

      const mr = await fetch('/api/player/missions/me', { credentials: 'include' });
      if (mr.ok) playerMission = await mr.json();
    } else {
      document.getElementById('navName').textContent = 'Neautentificat';
    }
  } catch {
    document.getElementById('navName').textContent = 'Neautentificat';
  }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  renderActiveSection(playerData, playerMission);
  renderMissions(missionsData, playerMission);
}

function renderActiveSection(playerData, playerMission) {
  const el = document.getElementById('activeSection');

  if (!playerData) {
    el.innerHTML = `
      <div class="login-note">
        <a href="/player/login">Autentifică-te</a> pentru a-ți urmări progresul misiunii active.
      </div>`;
    return;
  }

  const active = playerMission?.active;
  if (!active) {
    el.innerHTML = `
      <div class="login-note">
        Nu ai nicio misiune activă momentan. Folosește <strong>/ia-contract &lt;1-3&gt;</strong> în joc pentru a accepta una.
      </div>`;
    return;
  }

  const meta = missionMeta(active.type);
  const diff = diffMeta(active.diff);
  const progress = active.progress || 0;
  const goal = active.goal || active.amount || 1;
  const pct = Math.min(100, Math.round(progress / goal * 100));

  el.innerHTML = `
    <div class="sec-label">Contractul Tău Activ</div>
    <div class="contract-box" style="margin-bottom:28px">
      <div class="contract-header">
        <div class="contract-icon">${meta.icon}</div>
        <div>
          <div class="contract-title">${meta.name}</div>
          <div class="contract-desc">${active.desc || ''}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-family:'Exo 2',sans-serif;font-size:1.3rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,213,128,.3)">
            ${(active.reward || 0).toLocaleString('ro-RO')} <span style="font-size:.72rem;color:var(--muted);font-weight:400">coins</span>
          </div>
          <div class="diff-badge ${diff.cls}" style="margin-top:6px">${diff.label}</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progres</span>
          <span>${progress} / ${goal}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      ${active.done
        ? '<div class="done-badge">✔ Misiune completată! Recompensa a fost adăugată automat.</div>'
        : `<div style="font-size:.8rem;color:var(--muted)">${pct}% completat</div>`
      }
    </div>`;

  // Animate progress bar
  requestAnimationFrame(() => {
    setTimeout(() => {
      const fill = document.getElementById('progressFill');
      if (fill) fill.style.width = pct + '%';
    }, 80);
  });
}

function renderMissions(data, playerMission) {
  const grid = document.getElementById('missionsGrid');
  const sessionEl = document.getElementById('sessionInfo');

  if (!data || !data.missions || !data.missions.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><span style="font-size:2rem">📜</span><br><br>Nu sunt misiuni disponibile azi.</div>';
    return;
  }

  if (data.session !== undefined) {
    sessionEl.textContent = `Sesiunea #${data.session} — se resetează la miezul nopții`;
  }

  const activeIdx = playerMission?.active?.idx ?? playerMission?.today?.idx ?? null;

  grid.innerHTML = data.missions.map(m => {
    const meta = missionMeta(m.type);
    const diff = diffMeta(m.diff);
    const isActive = activeIdx !== null && m.idx === activeIdx;

    return `
      <div class="mission-card ${isActive ? 'active-mission' : ''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div class="mission-icon">${meta.icon}</div>
          <div class="diff-badge ${diff.cls}">${diff.label}</div>
        </div>
        <div class="mission-type">${meta.name}</div>
        <div class="mission-desc">${m.desc || ''}</div>
        <div class="mission-amount">Necesar: <strong>${m.amount}</strong></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
          <div class="mission-reward">${(m.reward || 0).toLocaleString('ro-RO')} <span>coins</span></div>
          ${isActive ? '<div class="active-badge">Activ</div>' : ''}
        </div>
      </div>`;
  }).join('');
}

async function logout() {
  await fetch('/api/player/logout', { method: 'POST', credentials: 'include' });
  window.location.href = '/player/login';
}

init();
</script>
</body>
</html>
