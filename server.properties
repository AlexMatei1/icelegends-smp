# ============================================================
# Minecraft SMP — server.properties
# Copiază în data/ sau lasă itzg/minecraft-server să îl genereze
# prin variabilele de mediu din docker-compose.yml
# ============================================================

# Autentificare Mojang — OBLIGATORIU true în producție
online-mode=true

# Dificultate: peaceful / easy / normal / hard
difficulty=normal

# Mod de joc implicit la prima conectare
gamemode=survival

# Protecție spawn: rază 16 blocuri în jurul coordonatelor (0,0)
spawn-protection=16

# Distanța de vedere în chunks — 8 = echilibru TPS vs experiență
view-distance=8

# Distanța de simulare — mai mică decât view distance pentru TPS
simulation-distance=6

# Numărul maxim de jucători
max-players=30

# Timeout tick în ms — serverul oprește dacă un tick durează mai mult
max-tick-time=60000

# Compresie pachete rețea — 256 bytes threshold (default bun)
network-compression-threshold=256

# RCON activat — acces local prin docker exec mc rcon-cli
enable-rcon=true
rcon.port=25575

# PvP activat — vanilla-first
pvp=true

# Flight dezactivat — previne zborul în supraviețuire
allow-flight=false

# Whitelist dezactivată implicit — activează înainte de launch public
white-list=false
enforce-whitelist=false

# Percentage entity broadcast range — 100% = vanilla default
entity-broadcast-range-percentage=100
